<!DOCTYPE html>
<html lang="en">
<head>

<style>
  html, body {

  #wrap { position: relative; width: 100vw; height: 100vh; }
  canvas { display: block; width: 100%; height: 100%; }
  #title {
    position: absolute; top: 22px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.92);
    font-size: 20px; font-weight: 600; letter-spacing: 5px;
    text-transform: uppercase;
    text-shadow: 0 2px 18px rgba(0,0,0,0.65), 0 0 28px rgba(120,180,255,0.25);
    pointer-events: none; user-select: none;
  }
  #title small {
    display: block; font-size: 10px; font-weight: 400;
    letter-spacing: 7px; opacity: 0.5; margin-top: 5px; text-align: center;

</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="title">Bridge Traffic Physics<small>canvas · parallax · suspension</small></div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = 0, H = 0;
const DPR = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', () => { resize(); setupCars(); });
resize();

let t = 0;

/* ---------- Car ---------- */
class Car {
  constructor(o) {
    this.x = o.x; this.y = o.y; this.vx = o.vx;
    this.w = o.w; this.h = o.h; this.wheelR = o.wheelR;
    this.color = o.color;
    this.dir = o.vx >= 0 ? 1 : -1;
    this.wheelAngle = 0;
    this.suspPhase = Math.random() * Math.PI * 2;
    this.suspFreq = 7 + Math.random() * 2.5;
    this.suspAmp = 1.4 + Math.random() * 1.4;
  }
  update(dt) {
    this.x += this.vx * dt;
    this.wheelAngle += (Math.abs(this.vx) / this.wheelR) * dt;
    this.suspPhase += this.suspFreq * dt;
    const margin = 220;
    if (this.dir > 0 && this.x > W + margin) this.x = -margin;
    if (this.dir < 0 && this.x < -margin) this.x = W + margin;
  }
  bounce() { return Math.sin(this.suspPhase) * this.suspAmp; }

  draw(ctx) {
    const b = this.bounce();
    const x = this.x, y = this.y + b;
    const w = this.w, h = this.h, dir = this.dir;

    // road shadow
    ctx.save();
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(x, this.y + 5, w * 0.55, 5.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    ctx.save();
    ctx.translate(x, y);
    if (dir < 0) ctx.scale(-1, 1);

    // body silhouette (front on right)
    const grad = ctx.createLinearGradient(0, -h, 0, 0);
    grad.addColorStop(0, this.color.top);
    grad.addColorStop(1, this.color.bottom);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(-w / 2, 0);
    ctx.lineTo(-w / 2 + 3, -h * 0.45);
    ctx.lineTo(-w * 0.30, -h * 0.5);
    ctx.lineTo(-w * 0.18, -h * 0.9);
    ctx.lineTo(w * 0.05, -h * 0.95);
    ctx.lineTo(w * 0.18, -h * 0.9);
    ctx.lineTo(w * 0.32, -h * 0.5);
    ctx.lineTo(w / 2 - 3, -h * 0.45);
    ctx.lineTo(w / 2, 0);
    ctx.closePath();
    ctx.fill();

    // window glass
    ctx.fillStyle = 'rgba(150,200,235,0.85)';
    ctx.beginPath();
    ctx.moveTo(-w * 0.28, -h * 0.52);
    ctx.lineTo(-w * 0.17, -h * 0.88);
    ctx.lineTo(w * 0.17, -h * 0.88);
    ctx.lineTo(w * 0.30, -h * 0.52);
    ctx.closePath();
    ctx.fill();
    // B-pillar
    ctx.fillStyle = 'rgba(15,15,22,0.65)';
    ctx.fillRect(w * 0.04, -h * 0.88, 2, h * 0.36);
    // body highlight
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-w / 2 + 4, -h * 0.42);
    ctx.lineTo(w / 2 - 4, -h * 0.42);
    ctx.stroke();

    // wheels
    const drawWheel = (wx) => {
      ctx.save();
      ctx.translate(wx, -this.wheelR);
      ctx.rotate(this.wheelAngle);
      ctx.fillStyle = '#13131a';
      ctx.beginPath(); ctx.arc(0, 0, this.wheelR, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#c4c4cc';
      ctx.beginPath(); ctx.arc(0, 0, this.wheelR * 0.55, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#5a5a64';
      ctx.lineWidth = 1.4;
      for (let i = 0; i < 5; i++) {
        const a = i * (Math.PI * 2 / 5);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(Math.cos(a) * this.wheelR * 0.5, Math.sin(a) * this.wheelR * 0.5);
        ctx.stroke();
      }
      ctx.fillStyle = '#2a2a32';
      ctx.beginPath(); ctx.arc(0, 0, this.wheelR * 0.18, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    };
    drawWheel(-w * 0.32);
    drawWheel(w * 0.32);

    // headlight (front = right)
    ctx.save();
    ctx.shadowColor = 'rgba(255,240,180,0.95)';
    ctx.shadowBlur = 16;
    ctx.fillStyle = 'rgba(255,250,210,1)';
    ctx.beginPath();
    ctx.ellipse(w / 2 - 3, -h * 0.3, 4, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    // headlight beam
    ctx.save();
    const beam = ctx.createLinearGradient(w / 2, -h * 0.3, w / 2 + 120, -h * 0.3);
    beam.addColorStop(0, 'rgba(255,240,180,0.32)');
    beam.addColorStop(1, 'rgba(255,240,180,0)');
    ctx.fillStyle = beam;
    ctx.beginPath();
    ctx.moveTo(w / 2, -h * 0.45);
    ctx.lineTo(w / 2 + 130, -h * 0.75);
    ctx.lineTo(w / 2 + 130, -h * 0.02);
    ctx.lineTo(w / 2, -h * 0.18);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // taillight (rear = left)
    ctx.save();
    ctx.shadowColor = 'rgba(255,60,40,0.95)';
    ctx.shadowBlur = 11;
    ctx.fillStyle = 'rgba(255,70,50,1)';
    ctx.beginPath();
    ctx.ellipse(-w / 2 + 3, -h * 0.3, 3, 2.6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    ctx.restore();
  }
}

/* ---------- Cars setup ---------- */
let cars = [];
function setupCars() {
  cars = [];
  const roadY = H * 0.62 + 4; // top of road surface
  const palette = [
    { top: '#e8483a', bottom: '#9c2418' },
    { top: '#3a78e8', bottom: '#1c3c80' },
    { top: '#f0c020', bottom: '#a07810' },
    { top: '#3cb070', bottom: '#1c6038' },
    { top: '#d8d8e0', bottom: '#888894' },
    { top: '#b040c0', bottom: '#601870' },
    { top: '#ff8a3a', bottom: '#a04418' },
    { top: '#28b8c0', bottom: '#106670' },
  ];
  const lanes = [
    { y: roadY - 2, vx:  85, scale: 0.82 },
    { y: roadY + 9, vx: 135, scale: 1.0  },
    { y: roadY + 22, vx: -115, scale: 1.05 },
    { y: roadY + 36, vx:  65, scale: 1.18 },
  ];
  lanes.forEach((lane, li) => {
    const count = 3;
    for (let i = 0; i < count; i++) {
      const w = 72 * lane.scale;
      const h = 26 * lane.scale;
      const col = palette[(li * 3 + i) % palette.length];
      cars.push(new Car({
        x: (W / count) * i + Math.random() * 80,
        y: lane.y,
        vx: lane.vx * (0.9 + Math.random() * 0.25),
        w, h,
        wheelR: 8 * lane.scale,
        color: col,
      }));
    }
  });
}
setupCars();

/* ---------- Background ---------- */
function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, H * 0.62);
  g.addColorStop(0, '#16243f');
  g.addColorStop(0.45, '#3a5a8a');
  g.addColorStop(0.78, '#e89060');
  g.addColorStop(1, '#f0b890');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H * 0.62);

  // sun
  const sunX = W * 0.72, sunY = H * 0.40;
  const sg = ctx.createRadialGradient(sunX, sunY, 4, sunX, sunY, 95);
  sg.addColorStop(0, 'rgba(255,242,205,1)');
  sg.addColorStop(0.3, 'rgba(255,200,140,0.8)');
  sg.addColorStop(1, 'rgba(255,180,120,0)');
  ctx.fillStyle = sg;
  ctx.beginPath(); ctx.arc(sunX, sunY, 95, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,250,220,0.96)';
  ctx.beginPath(); ctx.arc(sunX, sunY, 26, 0, Math.PI * 2); ctx.fill();

  // slow clouds
  const coff = (t * 6) % (W + 600);
  drawCloud(W - coff + 100, H * 0.16, 1.0);
  drawCloud(W - coff + 520, H * 0.11, 0.7);
  drawCloud(W - coff + 900, H * 0.21, 1.25);
  drawCloud(W - coff - 260, H * 0.14, 0.85);
}
function drawCloud(x, y, s) {
  ctx.save();
  ctx.globalAlpha = 0.55;
  ctx.fillStyle = 'rgba(255,240,230,1)';
  const r = 18 * s;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.arc(x + r * 0.9, y + r * 0.1, r * 0.8, 0, Math.PI * 2);
  ctx.arc(x - r * 0.9, y + r * 0.1, r * 0.7, 0, Math.PI * 2);
  ctx.arc(x + r * 0.3, y - r * 0.4, r * 0.7, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawRidge(offset, baseY, amp, color, freq) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(0, baseY);
  const step = 8;
  for (let x = 0; x <= W + step; x += step) {
    const u = (x + offset) * freq;
    const y = baseY - (Math.sin(u) * 0.5 + Math.sin(u * 2.3) * 0.3 + Math.sin(u * 0.7) * 0.6) * amp - amp * 0.4;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(W, H);
  ctx.lineTo(0, H);
  ctx.closePath();
  ctx.fill();
}

function drawWater() {
  const waterTop = H * 0.62;
  const g = ctx.createLinearGradient(0, waterTop, 0, H);
  g.addColorStop(0, '#3a6080');
  g.addColorStop(0.5, '#1c3850');
  g.addColorStop(1, '#0a1828');
  ctx.fillStyle = g;
  ctx.fillRect(0, waterTop, W, H - waterTop);

  // sun reflection column
  const sunX = W * 0.72;
  ctx.save();
  ctx.globalAlpha = 0.5;
  const rg = ctx.createLinearGradient(sunX, waterTop, sunX, H);
  rg.addColorStop(0, 'rgba(255,210,150,0.6)');
  rg.addColorStop(1, 'rgba(255,210,150,0)');
  ctx.fillStyle = rg;
  ctx.beginPath();
  ctx.moveTo(sunX - 70, waterTop);
  ctx.lineTo(sunX + 70, waterTop);
  ctx.lineTo(sunX + 22, H);
  ctx.lineTo(sunX - 22, H);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // ripple lines
  ctx.strokeStyle = 'rgba(200,220,240,0.13)';
  ctx.lineWidth = 1;
  const rows = 16;
  for (let i = 0; i < rows; i++) {
    const y = waterTop + 8 + i * ((H - waterTop) / rows);
    const phase = t * (0.6 + i * 0.05) + i;
    ctx.beginPath();
    for (let x = 0; x <= W; x += 12) {
      const yy = y + Math.sin(x * 0.02 + phase) * (1.5 + i * 0.22);
      if (x === 0) ctx.moveTo(x, yy); else ctx.lineTo(x, yy);
    }
    ctx.stroke();
  }
}

function drawBridge() {
  const deckY = H * 0.62;
  const towers = [W * 0.15, W * 0.5, W * 0.85];

  // towers
  towers.forEach(tx => {
    ctx.fillStyle = '#26262e';
    ctx.fillRect(tx - 8, deckY - 185, 16, 185);
    ctx.fillStyle = '#3a3a44';
    ctx.fillRect(tx - 10, deckY - 195, 20, 12);
    ctx.fillRect(tx -
