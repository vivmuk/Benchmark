<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAKURA · 桜</title>
<style>
  :root{
    --cream:#f6efe2;
    --parchment:#ece0cc;
    --pale-pink:#f7d6dd;
    --blossom:#f4c2cc;
    --dusty-rose:#c98b9a;
    --ink:#2b2622;
    --ink-soft:#4a423b;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{
    background:var(--cream);
    color:var(--ink);
    font-family:"Iowan Old Style","Palatino Linotype",Georgia,"Times New Roman","Yu Mincho",serif;
    overflow-x:hidden;
  }
  body{
    min-height:100vh;
    position:relative;
    background:
      radial-gradient(ellipse at 18% 8%, rgba(247,214,221,.45), transparent 55%),
      radial-gradient(ellipse at 85% 90%, rgba(201,139,154,.22), transparent 60%),
      radial-gradient(ellipse at 50% 50%, rgba(255,250,243,.5), transparent 70%),
      linear-gradient(180deg,#f8f2e7 0%,#efe2cf 100%);
    background-attachment:fixed;
  }
  /* parchment grain */
  body::before{
    content:"";
    position:fixed;inset:0;
    pointer-events:none;
    z-index:1;
    opacity:.4;
    mix-blend-mode:multiply;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.22  0 0 0 0 0.18  0 0 0 0 0.14  0 0 0 0.09 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }
  /* faint sumi-e ink wash blob */
  body::after{
    content:"";
    position:fixed;
    left:-10%;bottom:-20%;
    width:60vw;height:60vw;
    pointer-events:none;
    z-index:1;
    background:radial-gradient(circle at 40% 40%, rgba(43,38,34,.10), rgba(43,38,34,.04) 45%, transparent 65%);
    filter:blur(8px);
  }

  #petalCanvas{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:60;
  }

  nav{
    position:fixed;
    top:0;left:0;right:0;
    z-index:100;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:1.6rem 3rem;
    background:linear-gradient(180deg,rgba(246,239,226,.9),rgba(246,239,226,0));
    backdrop-filter:blur(3px);
    -webkit-backdrop-filter:blur(3px);
  }
  nav .brand{
    font-size:1.35rem;
    letter-spacing:.45em;
    font-weight:600;
    color:var(--ink);
  }
  nav .brand span{color:var(--dusty-rose)}
  nav ul{list-style:none;display:flex;gap:2.6rem}
  nav a{
    color:var(--ink-soft);
    text-decoration:none;
    font-size:.82rem;
    letter-spacing:.28em;
    text-transform:uppercase;
    position:relative;
    transition:color .35s ease;
  }
  nav a::after{
    content:"";
    position:absolute;left:0;bottom:-6px;
    width:0;height:1px;
    background:var(--dusty-rose);
    transition:width .35s ease;
  }
  nav a:hover{color:var(--dusty-rose)}
  nav a:hover::after{width:100%}

  .hero{
    position:relative;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:2rem;
    z-index:10;
  }
  .hero .kanji{
    font-size:clamp(2.5rem,7vw,5rem);
    color:var(--dusty-rose);
    opacity:.55;
    letter-spacing:.12em;
    margin-bottom:.6rem;
    font-weight:400;
  }
  .hero h1{
    font-size:clamp(4rem,15vw,12rem);
    font-weight:500;
    letter-spacing:.32em;
    color:var(--ink);
    line-height:1;
    margin-left:.32em;
    text-shadow:0 1px 0 rgba(255,255,255,.4);
  }
  .hero .divider{
    margin:2.2rem auto 1.6rem;
    width:70px;height:1px;
    background:var(--dusty-rose);
    position:relative;
  }
  .hero .divider::before,.hero .divider::after{
    content:"";
    position:absolute;top:50%;
    width:4px;height:4px;border-radius:50%;
    background:var(--dusty-rose);
    transform:translateY(-50%);
  }
  .hero .divider::before{left:-10px}
  .hero .divider::after{right:-10px}
  .hero .tagline{
    font-size:clamp(1rem,2vw,1.4rem);
    font-style:italic;
    color:var(--ink-soft);
    letter-spacing:.18em;
    max-width:620px;
    line-height:1.7;
  }
  .hero .sub{
    margin-top:1.4rem;
    font-size:.75rem;
    letter-spacing:.5em;
    text-transform:uppercase;
    color:var(--dusty-rose);
  }

  .branch{position:absolute;pointer-events:none;z-index:5;opacity:.95}
  .branch-tl{top:-2%;left:-3%;width:48vw;max-width:640px}
  .branch-br{bottom:-2%;right:-3%;width:42vw;max-width:560px;transform:scaleX(-1) scaleY(-1)}

  .ink-stroke{
    position:absolute;
    left:50%;bottom:8%;
    transform:translateX(-50%);
    width:min(80vw,700px);
    z-index:4;
    opacity:.5;
    pointer-events:none;
  }

  section{
    position:relative;
    z-index:10;
    padding:8rem 2rem;
  }
  .story{
    max-width:880px;
    margin:0 auto;
    text-align:center;
  }
  .story .label,.collection-wrap .label,.visit .label{
    font-size:.75rem;
    letter-spacing:.5em;
    text-transform:uppercase;
    color:var(--dusty-rose);
    margin-bottom:1.2rem;
  }
  .story h2,.visit h2{
    font-size:clamp(2rem,5vw,3.6rem);
    letter-spacing:.22em;
    margin-bottom:2rem;
    color:var(--ink);
    font-weight:500;
  }
  .story p{
    font-size:1.15rem;
    line-height:2;
    color:var(--ink-soft);
    letter-spacing:.04em;
    margin-bottom:1.4rem;
  }
  .story .quote{
    margin-top:2.5rem;
    font-style:italic;
    color:var(--dusty-rose);
    letter-spacing:.1em;
  }

  .collection-wrap{max-width:1200px;margin:0 auto}
  .collection-wrap h2{
    text-align:center;
    font-size:clamp(2rem,5vw,3.6rem);
    letter-spacing:.22em;
    margin-bottom:.4rem;
    font-weight:500;
  }
  .collection-wrap .head-label{text-align:center}
  .collection{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
    gap:1.8rem;
    margin-top:3.5rem;
  }
  .card{
    background:rgba(255,250,243,.55);
    border:1px solid rgba(201,139,154,.28);
    padding:2.6rem 1.6rem 2.2rem;
    text-align:center;
    transition:transform .45s ease,box-shadow .45s ease,border-color .45s ease;
    position:relative;
  }
  .card::before{
    content:"";
    position:absolute;
    inset:6px;
    border:1px solid rgba(201,139,154,.15);
    pointer-events:none;
  }
  .card:hover{
    transform:translateY(-8px);
    box-shadow:0 24px 50px rgba(43,38,34,.14);
    border-color:rgba(201,139,154,.5);
  }
  .card .num{
    font-size:.72rem;
    letter-spacing:.4em;
    color:var(--dusty-rose);
  }
  .card h3{
    font-size:1.5rem;
    letter-spacing:.18em;
    margin:1rem 0 .6rem;
    font-weight:500;
  }
  .card .jp{color:var(--dusty-rose);font-size:.9rem;letter-spacing:.2em;margin-bottom:1rem}
  .card p{font-size:.92rem;color:var(--ink-soft);line-height:1.75}

  .visit{text-align:center;max-width:760px;margin:0 auto}
  .visit p{color:var(--ink-soft);letter-spacing:.08em;line-height:1.9;font-size:1.05rem}
  .btn{
    display:inline-block;
    margin-top:2.4rem;
    padding:1.05rem 3.2rem;
    border:1px solid var(--ink);
    color:var(--ink);
    text-decoration:none;
    letter-spacing:.34em;
    text-transform:uppercase;
    font-size:.78rem;
    transition:all .35s ease;
    position:relative;
    overflow:hidden;
  }
  .btn:hover{background:var(--ink);color:var(--cream);letter-spacing:.4em}

  footer{
    text-align:center;
    padding:3rem 2rem;
    border-top:1px solid rgba(43,38,34,.15);
    color:var(--ink-soft);
    font-size:.78rem;
    letter-spacing:.3em;
    text-transform:uppercase;
    position:relative;
    z-index:10;
  }
  footer .kanji-small{color:var(--dusty-rose);letter-spacing:.2em;text-transform:none}

  @media (max-width:720px){
    nav{padding:1rem 1.4rem}
    nav ul{gap:1.1rem}
    nav a{font-size:.7rem;letter-spacing:.2em}
    nav .brand{font-size:1.05rem;letter-spacing:.3em}
    section{padding:5rem 1.4rem}
    .hero h1{letter-spacing:.22em;margin-left:.22em}
  }
</style>
</head>
<body>

<canvas id="petalCanvas"></canvas>

<nav>
  <div class="brand">SA<span>KU</span>RA</div>
  <ul>
    <li><a href="#home">Home</a></li>
    <li><a href="#story">Story</a></li>
    <li><a href="#collection">Collection</a></li>
    <li><a href="#visit">Visit</a></li>
  </ul>
</nav>

<!-- ===== SVG branch: bottom-right (mirrored) ===== -->
<svg class="branch branch-br" viewBox="0 0 560 380" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <filter id="inkBrush2" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02 0.05" numOctaves="3" seed="11" result="noise"/>

  <g filter="url(#inkBrush2)" stroke="#2b2622" stroke-linecap="round" fill="none">

  </g>
  <g filter="url(#inkBrushSoft2)">
    <use href="#blossom" x="70" y="60" width="24" height="24"/>
    <use href="#blossom" x="160" y="50" width="22" height="22"/>
    <use href="#blossom" x
