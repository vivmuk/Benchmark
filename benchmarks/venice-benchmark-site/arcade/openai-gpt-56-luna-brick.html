<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#160d29">
<title>Rangoli Breaker</title>
<style>
:root {
  --saffron: #ff9933;
  --green: #138808;
  --white: #fffdf5;
  --gold: #ffd166;
  --maroon: #721c24;
  --indigo: #28235c;
  --night: #100a20;
  --panel: rgba(20, 11, 42, .9);
}
* { box-sizing: border-box; }
html, body {
  width: 100%;
  height: 100%;
  margin: 0;
  overflow: hidden;
  background: var(--night);
  color: var(--white);
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
body { display: flex; align-items: center; justify-content: center; }
button {
  font: inherit;
  color: var(--white);
  border: 0;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
button:focus-visible {
  outline: 3px solid var(--gold);
  outline-offset: 3px;
}
.game {
  position: relative;
  width: 100%;
  height: 100%;
  max-width: 1500px;
  background: #110a25;
  isolation: isolate;
}
#gameCanvas {
  display: block;
  width: 100%;
  height: 100%;
  touch-action: none;
  cursor: crosshair;
}
.hud {
  position: absolute;
  z-index: 4;
  top: 0;
  left: 0;
  right: 0;
  height: 72px;
  padding: 10px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  pointer-events: none;
  background: linear-gradient(180deg, rgba(10, 5, 27, .92), rgba(10, 5, 27, 0));
}
.brand {
  display: flex;
  align-items: center;
  gap: 9px;
  min-width: 170px;
}
.brand-mark {
  width: 33px;
  height: 33px;
  display: grid;
  place-items: center;
  color: var(--gold);
  border: 2px solid var(--saffron);
  border-radius: 50%;
  font-size: 18px;
  text-shadow: 0 0 10px var(--saffron);
}
.brand-name {
  color: var(--gold);
  font-size: clamp(14px, 2vw, 19px);
  font-weight: 800;
  letter-spacing: .08em;
  text-transform: uppercase;
}
.stats {
  display: flex;
  justify-content: center;
  gap: clamp(8px, 2.5vw, 30px);
  flex: 1;
}
.stat { text-align: center; min-width: 52px; }
.stat-label {
  display: block;
  color: #d8cce5;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: .12em;
  text-transform: uppercase;
}
.stat-value {
  display: block;
  margin-top: 1px;
  color: var(--white);
  font-size: clamp(16px, 2.8vw, 25px);
  font-weight: 900;
  line-height: 1;
  text-shadow: 0 2px 8px rgba(0,0,0,.6);
}
#scoreValue { color: var(--gold); }
#livesValue { color: #ff9c9c; }
.hud-actions {
  display: flex;
  gap: 7px;
  min-width: 170px;
  justify-content: flex-end;
  pointer-events: auto;
}
.icon-button {
  width: 37px;
  height: 37px;
  display: grid;
  place-items: center;
  color: var(--white);
  background: rgba(57, 36, 92, .75);
  border: 1px solid rgba(255, 209, 102, .45);
  border-radius: 50%;
  font-size: 17px;
}
.icon-button:hover { background: rgba(255, 153, 51, .35); }
.overlay {
  position: absolute;
  z-index: 8;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: radial-gradient(circle at 50% 40%, rgba(67, 30, 82, .33), rgba(7, 4, 19, .78));
  backdrop-filter: blur(4px);
  opacity: 1;
  visibility: visible;
  transition: opacity .25s ease, visibility .25s ease;
}
.overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
.panel {
  width: min(580px, 100%);
  max-height: 92vh;
  overflow: auto;
  padding: clamp(25px, 5vw, 48px);
  text-align: center;
  background: linear-gradient(145deg, rgba(37, 18, 58, .97), rgba(17, 12, 43, .97));
  border: 1px solid rgba(255, 209, 102, .63);
  border-radius: 25px;
  box-shadow: 0 0 0 5px rgba(255, 153, 51, .09), 0 22px 70px rgba(0,0,0,.66), inset 0 0 50px rgba(255,153,51,.05);
}
.panel::before {
  content: "✦  ❈  ✦";
  display: block;
  margin-bottom: 12px;
  color: var(--saffron);
  font-size: 23px;
  letter-spacing: .38em;
}
.panel h1 {
  margin: 0;
  color: var(--gold);
  font-family: Georgia, serif;
  font-size: clamp(38px, 8vw, 72px);
  line-height: .95;
  text-shadow: 0 3px 0 var(--maroon), 0 0 25px rgba(255,153,51,.45);
}
.panel h2 {
  margin: 0 0 9px;
  color: var(--gold);
  font-family: Georgia, serif;
  font-size: clamp(28px, 6vw, 46px);
}
.subtitle {
  margin: 12px auto 24px;
  color: #f3e7d3;
  font-size: clamp(14px, 2vw, 17px);
  line-height: 1.55;
}
.primary {
  min-width: 190px;
  padding: 14px 28px;
  color: #351023;
  background: linear-gradient(135deg, #ffb347, #ffd166);
  border: 2px solid #ffe7a5;
  border-radius: 999px;
  box-shadow: 0 5px 0 #9c4e22, 0 0 25px rgba(255,153,51,.35);
  font-weight: 900;
  letter-spacing: .05em;
  transition: transform .15s ease, filter .15s ease;
}
.primary:hover { transform: translateY(-2px); filter: brightness(1.08); }
.primary:active { transform: translateY(2px); box-shadow: 0 2px 0 #9c4e22; }
.controls {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin: 27px auto 0;
  max-width: 390px;
  color: #dfd4e6;
  font-size: 12px;
}
.control {
  padding: 9px 7px;
  background: rgba(255,255,255,.055);
  border-radius: 9px;
}
.key {
  display: inline-block;
  padding: 2px 6px;
  color: var(--gold);
  border: 1px solid rgba(255,209,102,.6);
  border-radius: 4px;
  font-size: 11px;
  font-weight: 800;
}
.best-line {
  margin-top: 20px;
  color: #bba9ce;
  font-size: 13px;
}
.best-line strong { color: var(--gold); }
#stageMessage {
  position: absolute;
  z-index: 5;
  top: 78px;
  left: 50%;
  transform: translateX(-50%);
  pointer-events: none;
  color: var(--gold);
  font-family: Georgia, serif;
  font-size: clamp(20px, 4vw, 34px);
  font-weight: 700;
  letter-spacing: .04em;
  text-align: center;
  text-shadow: 0 2px 12px #100a20;
  opacity: 0;
  transition: opacity .2s ease;
}
#stageMessage.show { opacity: 1; }
.power-strip {
  position: absolute;
  z-index: 4;
  left: 50%;
  bottom: 13px;
  transform: translateX(-50%);
  display: flex;
  gap: 7px;
  pointer-events: none;
}
.effect-pill {
  padding: 4px 9px;
  color: #fff;
  background: rgba(20, 10, 46, .8);
  border: 1px solid rgba(255,209,102,.5);
  border-radius: 99px;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: .06em;
  text-transform: uppercase;
  box-shadow: 0 2px 9px rgba(0,0,0,.35);
}
@media (max-width: 620px) {
  .hud { height: 58px; padding: 7px 9px; }
  .brand { min-width: auto; }
  .brand-name { display: none; }
  .brand-mark { width: 29px; height: 29px; font-size: 15px; }
  .hud-actions { min-width: auto; }
  .icon-button { width: 32px; height: 32px; font-size: 14px; }
  .stats { gap: 10px; }
  .stat-label { font-size: 8px; }
  .stat-value { font-size: 17px; }
  #stageMessage { top: 63px; }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; }
}
</style>
</head>
<body>
<main class="game" aria-label="Rangoli Breaker festival brick breaker game">
  <canvas id="gameCanvas" aria-label="Game play area"></canvas>
  <header class="hud" aria-live="polite">
    <div class="brand"><span class="brand-mark">✦</span><span class="brand-name">Rangoli Breaker</span></div>
    <div class="stats">
      <div class="stat"><span class="stat-label">Score</span><span id="scoreValue" class="stat-value">0</span></div>
      <div class="stat"><span class="stat-label">Best</span><span id="bestValue" class="stat-value">0</span></div>
      <div class="stat"><span class="stat-label">Level</span><span id="levelValue" class="stat-value">1</span></div>
      <div class="stat"><span class="stat-label">Lives</span><span id="livesValue" class="stat-value">♥♥♥</span></div>
    </div>
    <div class="hud-actions">
      <button id="soundButton" class="icon-button" aria-label="Mute sound" title="Mute sound">🔊</button>
      <button id="pauseButton" class="icon-button" aria-label="Pause game" title="Pause game">Ⅱ</button>
    </div>
  </header>
  <div id="stageMessage" role="status"></div>
  <div id="powerStrip" class="power-strip" aria-live="polite"></div>
  <section id="overlay" class="overlay">
    <div class="panel">
      <h1 id="overlayTitle">Rangoli<br>Breaker</h1>
      <h2 id="overlayHeading" style="display:none"></h2>
      <p id="overlayText" class="subtitle">Smash the mandala, catch the blessings, and light up the night.</p>
      <button id="mainButton" class="primary">Begin Celebration</button>
      <div class="controls">
        <div class="control"><span class="key">← →</span> / <span class="key">A D</span><br>Move paddle</div>
        <div class="control"><span class="key">SPACE</span><br>Launch ball</div>
        <div class="control">Touch &amp; swipe<br>Move and launch</div>
        <div class="control"><span class="key">P</span><br>Pause</div>
      </div>
      <div id="bestLine" class="best-line">Best celebration: <strong>0</strong></div>
    </div>
  </section>
</main>
<script>
(() => {
"use strict";

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d", { alpha: false });
const overlay = document.getElementById("overlay");
const overlayTitle = document.getElementById("overlayTitle");
const overlayHeading = document.getElementById("overlayHeading");
const overlayText = document.getElementById("overlayText");
const mainButton = document.getElementById("mainButton");
const bestLine = document.getElementById("bestLine");
const scoreValue = document.getElementById("scoreValue");
const bestValue = document.getElementById("bestValue");
const levelValue = document.getElementById("levelValue");
const livesValue = document.getElementById("livesValue");
const soundButton = document.getElementById("soundButton");
const pauseButton = document.getElementById("pauseButton");
const stageMessage = document.getElementById("stageMessage");
const powerStrip = document.getElementById("powerStrip");

const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
const colors = ["#ff9933", "#138808", "#ffffff", "#ffd166", "#b52b3b", "#3b328a"];
const powerNames = {
  multi: "Multi-ball",
  extend: "Paddle extend",
  slow: "Slow ball",
  sticky: "Sticky paddle",
  laser: "Laser",
  life: "Extra life"
};
const powerSymbols = { multi: "✦", extend: "↔", slow: "◌", sticky: "●", laser: "⚡", life: "♥" };

let W = 900, H = 700, dpr = 1;
let last = 0, elapsed = 0;
let score = 0, best = 0, level = 1, lives = 3, combo = 0;
let screen = "start";
let muted = false;
let audioContext = null, masterGain = null, noiseBuffer = null;
let bricks = [], balls = [], particles = [], powerups = [], lasers = [], texts = [];
let stars = [];
let levelTimer = 0, respawnTimer = 0, comboTimer = 0;
let stageTextTimer = 0;
let pointerActive = false, touchStartX = 0, touchStartY = 0;
let targetPaddleX = null;
let nextLaser = 0;
let shake = 0;
let soundReady = false;

const keys = { left: false, right: false };
const paddle = {
  x: 0, y: 0, w: 132, h: 15, baseW: 132, speed: 720,
  extend: 0, sticky: 0, laser: 0
};

try { best = Number(localStorage.getItem("rangoliBreakerBest") || 0); } catch (e) { best = 0; }

function resize() {
  const rect = canvas.getBoundingClientRect();
  W = Math.max(320, rect.width);
  H = Math.max(430, rect.height);
  dpr = Math.min(2, window.devicePixelRatio || 1);
  canvas.width = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  paddle.y = H - Math.max(49, Math.min(72, H * .095));
  paddle.w = paddle.extend > 0 ? paddle.baseW * 1.65 : paddle.baseW;
  paddle.x = clamp(paddle.x || W / 2 - paddle.w / 2, 12, W - paddle.w - 12);
  if (!stars.length) createStars();
}
window.addEventListener("resize", resize);

function createStars() {
  stars = [];
  const count = reducedMotion ? 45 : Math.max(65, Math.floor(W * H / 9000));
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * W, y: Math.random() * H * .76,
      r: Math.random() * 1.5 + .25,
      phase: Math.random() * Math.PI * 2,
      hue: Math.random() > .72 ? "#ffd166" : "#fffdf5"
    });
  }
}

function clamp(n, min, max) { return Math.max(min, Math.min(max, n)); }
function rand(min, max) { return Math.random() * (max - min) + min; }
function choose(a) { return a[Math.floor(Math.random() * a.length)]; }
function rr(c, x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  c.beginPath();
  c.moveTo(x + r, y);
  c.arcTo(x + w, y, x + w, y + h, r);
  c.arcTo(x + w, y + h, x, y + h, r);
  c.arcTo(x, y + h, x, y, r);
  c.arcTo(x, y, x + w, y, r);
  c.closePath();
}
function circleRect(ball, b) {
  const cx = clamp(ball.x, b.x, b.x + b.w);
  const cy = clamp(ball.y, b.y, b.y + b.h);
  const dx = ball.x - cx, dy = ball.y - cy;
  return dx * dx + dy * dy <= ball.r * ball.r;
}

function createLevel(n) {
  bricks = [];
  const cols = W < 550 ? 9 : 12;
  const rows = 7;
  const gap = Math.max(4, W * .006);
  const margin = Math.max(18, W * .065);
  const bw = (W - margin * 2 - gap * (cols - 1)) / cols;
  const bh = Math.max(18, Math.min(27, H * .034));
  const startY = Math.max(104, H * .145);
  const cx = (cols - 1) / 2;
  const cy = (rows - 1) / 2;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const dx = c - cx, dy = r - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      let active = true;
      if (n === 1) {
        active = r <= 2 || (r === 3 && c > 0 && c < cols - 1) || (r === 4 && (c % 2 === 0 || c === Math.floor(cx)));
      } else if (n === 2) {
        active = (dist < 4.5 && (dist < 1.55 || (dist > 2.15 && dist < 3.85) || r === 0 || r === rows - 1));
      } else if (n === 3) {
        active = (r < 5 && (c >= r - 1 && c < cols - r + 1)) || (r === 5 && c % 2 === 0);
      } else if (n === 4) {
        active = dist < 4.9 && !(r === 0 && (c === 0 || c === cols - 1)) && !(r === 6 && (c === 0 || c === cols - 1));
      } else {
        active = dist < 5.2 && (Math.abs(dx) < 2.7 || Math.abs(dy) < 2.4 || ((c + r) % 3 === 0));
      }
      if (!active) continue;
      const hp = n >= 3 && ((r * 3 + c + n) % 7 === 0) ? 2 : 1;
      bricks.push({
        x: margin + c * (bw + gap),
        y: startY + r * (bh + gap),
        w: bw, h: bh, hp, maxHp: hp,
        color: colors[(r * 2 + c + n) % colors.length],
        flash: 0, dead: false, seed: Math.random() * 10
      });
    }
  }
  levelValue.textContent = n;
  showStage("Level " + n + " · " + (n === 1 ? "Marigold Garland" : n === 2 ? "Mandala of Light" : n === 3 ? "Palace Arch" : n === 4 ? "Lotus Rangoli" : "Grand Diwali Finale"), 2.2);
}

function newBall(stuck = true, angle = 0) {
  const speed = Math.min(670, 360 + level * 35);
  return {
    x: paddle.x + paddle.w / 2,
    y: paddle.y - 13,
    r: Math.max(6, Math.min(9, W * .011)),
    vx: Math.sin(angle) * speed,
    vy: -Math.cos(angle) * speed,
    speed, stuck, trail: [], hue: choose(["#fffdf5", "#ffd166", "#ffcf70"])
  };
}

function resetGame() {
  score = 0; level = 1; lives = 3; combo = 0;
  paddle.extend = paddle.sticky = paddle.laser = 0;
  paddle.w = paddle.baseW;
  paddle.x = W / 2 - paddle.w / 2;
  particles = []; powerups = []; lasers = []; texts = [];
  balls = [newBall(true)];
  createLevel(level);
  updateHud();
}

function startGame() {
  ensureAudio();
  resetGame();
  screen = "playing";
  overlay.classList.add("hidden");
  pauseButton.textContent = "Ⅱ";
  pauseButton.setAttribute("aria-label", "Pause game");
  showStage("Tap, click, or press SPACE to launch", 3);
}

function launchBalls() {
  let launched = false;
  balls.forEach((b, i) => {
    if (b.stuck) {
      const angle = i === 0 ? rand(-.55, .55) : rand(-.85, .85);
      const speed = b.speed;
      b.vx = Math.sin(angle) * speed;
      b.vy = -Math.cos(angle) * speed;
      b.stuck = false;
      launched = true;
    }
  });
  if (launched) sfx("launch");
}

function pauseGame() {
  if (screen !== "playing") return;
  screen = "paused";
  overlayTitle.style.display = "none";
  overlayHeading.style.display = "block";
  overlayHeading.textContent = "Celebration Paused";
  overlayText.textContent = "The diyas are waiting for you.";
  mainButton.textContent = "Resume Celebration";
  bestLine.innerHTML = "Press <strong>P</strong> or tap resume to continue";
  overlay.classList.remove("hidden");
  pauseButton.textContent = "▶";
  pauseButton.setAttribute("aria-label", "Resume game");
}
function resumeGame() {
  if (screen !== "paused") return;
  screen = "playing";
  overlay.classList.add("hidden");
  pauseButton.textContent = "Ⅱ";
  pauseButton.setAttribute("aria-label", "Pause game");
  ensureAudio();
}
function showGameOver() {
  screen = "over";
  overlayTitle.style.display = "none";
  overlayHeading.style.display = "block";
  overlayHeading.textContent = "The Flame Fades";
  overlayText.textContent = "Every celebration has another beginning. Your rangoli score was " + score.toLocaleString() + ".";
  mainButton.textContent = "Celebrate Again";
  bestLine.innerHTML = "Best celebration: <strong>" + best.toLocaleString() + "</strong>";
  overlay.classList.remove("hidden");
  sfx("over");
}
function showVictory() {
  screen = "victory";
  overlayTitle.style.display = "none";
  overlayHeading.style.display = "block";
  overlayHeading.textContent = "A Grand Finale!";
  overlayText.textContent = "You illuminated every rangoli and filled the sky with color.";
  mainButton.textContent = "Play Again";
  bestLine.innerHTML = "Final score: <strong>" + score.toLocaleString() + "</strong> · Best: <strong>" + best.toLocaleString() + "</strong>";
  overlay.classList.remove("hidden");
  sfx("victory");
}
function showStage(text, seconds) {
  stageMessage.textContent = text;
  stageMessage.classList.add("show");
  stageTextTimer = seconds;
}
function updateStage(dt) {
  if (stageTextTimer > 0) {
    stageTextTimer -= dt;
    if (stageTextTimer <= 0) stageMessage.classList.remove("show");
  }
}

mainButton.addEventListener("click", () => {
  ensureAudio();
  if (screen === "paused") resumeGame();
  else startGame();
});
pauseButton.addEventListener("click", () => {
  ensureAudio();
  if (screen === "playing") pauseGame();
  else if (screen === "paused") resumeGame();
});
soundButton.addEventListener("click", () => {
  muted = !muted;
  soundButton.textContent = muted ? "🔇" : "🔊";
  soundButton.setAttribute("aria-label", muted ? "Unmute sound" : "Mute sound");
  if (!muted) { ensureAudio(); sfx("power"); }
});

function updateHud() {
  scoreValue.textContent = score.toLocaleString();
  bestValue.textContent = best.toLocaleString();
  levelValue.textContent = level;
  livesValue.textContent = "♥".repeat(Math.max(0, lives)) + "♡".repeat(Math.max(0, 3 - lives));
  powerStrip.innerHTML = "";
  const effects = [];
  if (paddle.extend > 0) effects.push(["↔ Extend", paddle.extend]);
  if (paddle.sticky > 0) effects.push(["● Sticky", paddle.sticky]);
  if (paddle.laser > 0) effects.push(["⚡ Laser", paddle.laser]);
  if (balls.length > 1) effects.push(["✦ " + balls.length + " Balls", 0]);
  if (effects.length) {
    effects.forEach(e => {
      const el = document.createElement("span");
      el.className = "effect-pill";
      el.textContent = e[0] + (e[1] ? " " + Math.ceil(e[1]) + "s" : "");
      powerStrip.appendChild(el);
    });
  }
}
function addScore(value) {
  score += value;
  if (score > best) {
    best = score;
    try { localStorage.setItem("rangoliBreakerBest", String(best)); } catch (e) {}
  }
  updateHud();
}

function update(dt) {
  elapsed += dt;
  updateStage(dt);
  updateParticles(dt);
  updateTexts(dt);
  if (screen !== "playing") return;

  if (levelTimer > 0) {
    levelTimer -= dt;
    if (levelTimer <= 0) {
      if (level >= 5) {
        showVictory();
        return;
      }
      level++;
      powerups = []; lasers = [];
      createLevel(level);
      balls = [newBall(true)];
      updateHud();
    }
    return;
  }
  if (respawnTimer > 0) {
    respawnTimer -= dt;
    if (respawnTimer <= 0) balls = [newBall(true)];
    updatePaddle(dt);
    updatePowerups(dt);
    updateLasers(dt);
    updateEffects(dt);
    return;
  }

  updatePaddle(dt);
  updateEffects(dt);
  updatePowerups(dt);
  updateLasers(dt);

  if (comboTimer > 0) comboTimer -= dt;
  else combo = 0;

  let surviving = [];
  for (const ball of balls) {
    if (ball.stuck) {
      ball.x = paddle.x + paddle.w / 2;
      ball.y = paddle.y - ball.r - 3;
      ball.trail = [];
      surviving.push(ball);
      continue;
    }
