    <div id="game-container">
        <canvas id="game" tabindex="0" aria-label="Brick Breaker game canvas. Use arrow keys or WASD to move the paddle. Press space or tap to launch the ball."></canvas>

    <script>
        (function() {
            const canvas = document.getElementById('game');
            const ctx = canvas.getContext('2d');
            const container = document.getElementById('game-container');

            const GAME_W = 800;
            const GAME_H = 560;
            canvas.width = GAME_W;
            canvas.height = GAME_H;

            const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

            // ─── Sound Engine ────────────────────────────
            let audioCtx = null;

            function getAudioCtx() {
                if (!audioCtx) {
                    try {
                        audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    } catch (e) {
                        audioCtx = null;
                    }
                }
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                return audioCtx;
            }

            function playSound(freq, type, duration, vol = 0.08, glideTo = null, glideStart = 0) {
                if (prefersReducedMotion) return;
                const ac = getAudioCtx();
                if (!ac) return;
                const t = ac.currentTime;
                const osc = ac.createOscillator();
                const gain = ac.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, t);
                if (glideTo !== null) osc.frequency.linearRampToValueAtTime(glideTo, t + glideStart + duration * 0.6);
                gain.gain.setValueAtTime(vol, t);
                gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
                osc.connect(gain);
                gain.connect(ac.destination);
                osc.start(t);
                osc.stop(t + duration);
            }

            function sfxBrick(row) {
                const pitch = 220 + (7 - row) * 55;
                playSound(pitch, 'square', 0.1, 0.06, pitch * 1.5, 0.02);
            }

            function sfxPaddle() {
                playSound(180, 'triangle', 0.12, 0.05);
            }

            function sfxWall() {
                playSound(600, 'sine', 0.08, 0.04);
            }

            function sfxPowerup() {
                const ac = getAudioCtx();
                if (!ac || prefersReducedMotion) return;
                const t = ac.currentTime;
                [400, 600, 900].forEach((f, i) => {
                    const osc = ac.createOscillator();
                    const gain = ac.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(f, t + i * 0.08);
                    gain.gain.setValueAtTime(0.07, t + i * 0.08);
                    gain.gain.exponentialRampToValueAtTime(0.0001, t + i * 0.08 + 0.15);
                    osc.connect(gain);
                    gain.connect(ac.destination);
                    osc.start(t + i * 0.08);
                    osc.stop(t + i * 0.08 + 0.15);
                });
            }

            function sfxLifeLost() {
                const ac = getAudioCtx();
                if (!ac || prefersReducedMotion) return;
                const t = ac.currentTime;
                [300, 200, 120].forEach((f, i) => {
                    const osc = ac.createOscillator();
                    const gain = ac.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(f, t + i * 0.15);
                    gain.gain.setValueAtTime(0.06, t + i * 0.15);
                    gain.gain.exponentialRampToValueAtTime(0.0001, t + i * 0.15 + 0.25);
                    osc.connect(gain);
                    gain.connect(ac.destination);
                    osc.start(t + i * 0.15);
                    osc.stop(t + i * 0.15 + 0.25);
                });
            }

            function sfxLevelUp() {
                const ac = getAudioCtx();
                if (!ac || prefersReducedMotion) return;

                    osc.frequency.setValueAtTime(f, t + i * 0.1);

            let levelTransitionTimer = 0;

            // ─── Stars ──────────────────────────────────

            // ─── Particles ──────────────────────────────
            const particles = [];
            const MAX_PARTICLES = prefersReducedMotion ? 0 : 300;

            function spawnParticles(x, y, count, color, spread = 3, life = 0.6, size = 2.5) {
                if (prefersReducedMotion) return;
                for (let i = 0; i < count; i++) {
                    if (particles.length >= MAX_PARTICLES) particles.shift();
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * spread * 60 + 20;
                    particles.push({
                        x,
                        y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - Math.random() * 100,
                        life,
                        maxLife: life,
                        color,
                        size: Math.random() * size + 1
                    });
                }
            }

            function spawnTrail(x, y, count = 2) {
                if (prefersReducedMotion) return;
                for (let i = 0; i < count; i++) {
                    if (particles.length >= MAX_PARTICLES) particles.shift();
                    particles.push({
                        x: x + (Math.random() - 0.5) * 8,
                        y: y + (Math.random() - 0.5) * 8,
                        vx: (Math.random() - 0.5) * 30,
                        vy: (Math.random() - 0.5) * 30,
                        life: 0.35,
                        maxLife: 0.35,
                        color: '#ffffff',
                        size: Math.random() * 2 + 0.8
                    });
                }
            }

            // ─── Paddle ─────────────────────────────────
            const paddle = {
                x: GAME_W / 2,
                y: GAME_H - 50,
                width: 120,
                height: 16,

                laserCooldown: 0,
                stickyActive: false,
                stickyTimer: 0,
                slowTimer: 0,
                targetX: GAME_W / 2,
            };

            function resetPaddle() {
                paddle.x = GAME_W / 2;
                paddle.width = paddle.baseWidth;
                paddle.extendTimer = 0;
                paddle.laserTimer = 0;
                paddle.laserCooldown = 0;
                paddle.stickyActive = false;
                paddle.stickyTimer = 0;
                paddle.slowTimer = 0;
                paddle.targetX = GAME_W / 2;
            }

            // ─── Balls ──────────────────────────────────
            const balls = [];
            const BALL_SPEED = 420;
            const MAX_BALLS = 20;

            function createBall(x, y, vx, vy) {
                return {
                    x,
                    y,
                    vx,
                    vy,
                    radius: 7,
                    speed: BALL_SPEED,
                    stuck: false,
                    stuckOffsetX: 0,
                    trailTimer: 0,
                    trailInterval: 0.03,
                };
            }

            function spawnBallOnPaddle() {
                const b = createBall(paddle.x, paddle.y - paddle.height / 2 - 8, 0, 0);
                b.stuck = true;
                b.stuckOffsetX = 0;
                balls.push(b);
            }

            function launchBall(ball) {
                if (!ball.stuck) return;
                ball.stuck = false;
                const angle = (Math.random() - 0.5) * 0.6 - Math.PI / 2;
                ball.vx = Math.cos(angle) * BALL_SPEED;
                ball.vy = Math.sin(angle) * BALL_SPEED;
                if (Math.abs(ball.vy) < BALL_SPEED * 0.4) ball.vy = -BALL_SPEED * 0.7;
                sfxLaunch();
            }

            function launchAllStuckBalls() {
                let launched = false;
                balls.forEach(b => {
                    if (b.stuck) { launchBall(b);
                        launched = true; }
                });
                return launched;
            }

            function normalizeBallSpeed(ball) {
                const spd = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
                if (spd < 10) {
                    ball.vx = 0;
                    ball.vy = -ball.speed;
                    return;
                }
                const targetSpeed = ball.speed * (paddle.slowTimer > 0 ? 0.5 : 1.0);
                const ratio = targetSpeed / spd;
                ball.vx *= ratio;
                ball.vy *= ratio;
                if (Math.abs(ball.vy) < targetSpeed * 0.25) {
                    ball.vy = (ball.vy >= 0 ? 1 : -1) * targetSpeed * 0.25;
                    const remaining = Math.sqrt(Math.max(0, targetSpeed * targetSpeed - ball.vy * ball.vy));
                    ball.vx = (ball.vx >= 0 ? 1 : -1) * remaining;
                }
            }

            // ─── Lasers ─────────────────────────────────

            // ─── Power-ups ──────────────────────────────
            const powerups = [];
            const POWERUP_TYPES = ['multiball', 'extend', 'slow', 'sticky', 'laser', 'life'];
            const POWERUP_COLORS = {
                multiball: '#ff9500',
                extend: '#34c759',
                slow: '#ffd740',
                sticky: '#af52de',
                laser: '#ff3b30',
                life: '#ff6b9d'

            const POWERUP_LABELS = {
                multiball: '×3',
                extend: '↔',
                slow: '~',
                sticky: '●',
                laser: '⚡',
                life: '+'

            const POWERUP_DURATION = 15;

            function spawnPowerup(x, y) {
                if (Math.random() > 0.28) return;
                const type = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
                powerups.push({
                    x,
                    y,
                    type,
                    vy: 180,
                    radius: 13,
                    color: POWERUP_COLORS[type],
                    label: POWERUP_LABELS[type],

                    glowDir: 1,

            function collectPowerup(pu) {
                sfxPowerup();
                spawnParticles(pu.x, pu.y, 20, pu.color, 4, 0.5, 3);
                switch (pu.type) {
                    case 'multiball':
                        const currentBalls = [...balls];
                        currentBalls.forEach(origBall => {
                            if (origBall.stuck) return;
                            if (balls.length >= MAX_BALLS) return;
                            for (let angleOff = -0.45; angleOff <= 0.45; angleOff += 0.45) {
                                if (angleOff === 0) continue;
                                if (balls.length >= MAX_BALLS) break;
                                const spd = Math.sqrt(origBall.vx * origBall.vx + origBall.vy * origBall
                                    .vy);
                                const baseAngle = Math.atan2(origBall.vy, origBall.vx);
                                const newAngle = baseAngle + angleOff;
                                const nb = createBall(origBall.x, origBall.y, Math.cos(newAngle) * spd, Math.sin(
                                    newAngle) * spd);
                                nb.speed = origBall.speed;
                                nb.stuck = false;
                                balls.push(nb);
                            }
                        });
                        break;
                    case 'extend':
                        paddle.extendTimer = POWERUP_DURATION;
                        paddle.width = paddle.extendedWidth;
                        break;
                    case 'slow':
                        paddle.slowTimer = POWERUP_DURATION;
                        balls.forEach(b => { b.speed = BALL_SPEED * 0.5; });
                        break;
                    case 'sticky':
                        paddle.stickyActive = true;
                        paddle.stickyTimer = POWERUP_DURATION;
                        break;
                    case 'laser':
                        paddle.laserTimer = POWERUP_DURATION;
                        paddle.laserCooldown = 0;
                        break;
                    case 'life':
                        lives = Math.min(lives + 1, 6);
                        spawnParticles(paddle.x, paddle.y - 20, 30, '#ff6b9d', 5, 0.7, 4);
                        break;

            const BRICK_AREA_LEFT = (GAME_W - (BRICK_COLS * (BRICK_W + BRICK_GAP) - BRICK_GAP)) / 2;

            const BRICK_COLORS_HP = {

            function loadLevel(lvl) {
                bricks.length = 0;
                lasers.length = 0;
                powerups.length = 0;
                particles.length = 0;
                balls.length = 0;
                const def = LEVEL_DEFS[Math.min(lvl - 1, LEVEL_DEFS.length - 1)];
                for (let row = 0; row < BRICK_ROWS; row++) {
                    for (let col = 0; col < BRICK_COLS; col++) {
                        const hp = (def[row] && def[row][col]) ? def[row][col] : 0;
                        if (hp > 0) {
                            bricks.push(createBrick(col, row, hp));
                        }
                    }
                }
                resetPaddle();
                spawnBallOnPaddle();
            }

            function allBricksCleared() {
                return bricks.every(b => !b.alive);
            }

            // ─── Game Functions ─────────────────────────
            function saveBestScore() {
                if (score > bestScore) {
                    bestScore = score;
                    localStorage.setItem('brickBreakerBest', bestScore.toString());
                }
            }

            function loseLife() {
                lives--;
                sfxLifeLost();
                shakeAmount = 8;
                saveBestScore();
                balls.length = 0;
                lasers.length = 0;
                powerups.length = 0;
                resetPaddle();
                if (lives <= 0) {
                    gameState = STATE.GAME_OVER;
                    sfxGameOver();
                    saveBestScore();
                } else {
                    spawnBallOnPaddle();
                    gameState = STATE.PLAYING;
                }
            }

            function nextLevel() {
                level++;
                saveBestScore();
                if (level > TOTAL_LEVELS) {
                    gameState = STATE.VICTORY;
                    sfxVictory();
                    saveBestScore();
                } else {
                    gameState = STATE.LEVEL_TRANSITION;
                    levelTransitionTimer = LEVEL_TRANSITION_DURATION;
                    sfxLevelUp();
                    loadLevel(level);
                }
            }

            function restartGame() {
                score = 0;
                lives = 3;
                level = 1;
                balls.length = 0;
                lasers.length = 0;
                powerups.length = 0;
                particles.length = 0;
                resetPaddle();
                loadLevel(1);
                gameState = STATE.PLAYING;
                spawnBallOnPaddle();
            }

            function startGame() {
                restartGame();
                gameState = STATE.PLAYING;
            }

            // ─── Update ──────────────────────────────────
            function update(dt) {
                if (gameState === STATE.LEVEL_TRANSITION) {
                    levelTransitionTimer -= dt;
                    if (levelTransitionTimer <= 0) {
                        gameState = STATE.PLAYING;
                        spawnBallOnPaddle();
                    }
                    return;
                }
                if (gameState !== STATE.PLAYING) return;
                if (dt > 0.1) dt = 0.1;

                shakeAmount *= shakeDecay;
                if (shakeAmount < 0.05) shakeAmount = 0;

                // Paddle movement
                let moveDir = 0;
                if (keys['ArrowLeft'] || keys['KeyA']) moveDir = -1;
                if (keys['ArrowRight'] || keys['KeyD']) moveDir += 1;
                if (touchActive) {
                    const targetX = touchX;
                    const diff = targetX - paddle.x;
                    if (Math.abs(diff) > 2) {
                        moveDir = Math.sign(diff);
                    }
                }
                if (moveDir !== 0) {
                    paddle.x += moveDir * paddle.speed * dt;
                }
                paddle.x = Math.max(paddle.width / 2, Math.min(GAME_W - paddle.width / 2, paddle.x));

                    paddle.extendTimer -= dt;

                }

                    paddle.laserTimer -= dt;
                    if (paddle.laserTimer <= 0) paddle.laserCooldown = 0;
                }
                if (paddle.laserCooldown > 0) paddle.laserCooldown -= dt;
                if (paddle.stickyTimer > 0) {
                    paddle.stickyTimer -= dt;
                    if (paddle.stickyTimer <= 0) paddle.stickyActive = false;
                }
                if (paddle.slowTimer > 0) {
                    paddle.slowTimer -= dt;
                    if (paddle.slowTimer <= 0) {
                        balls.forEach(b => { b.speed = BALL_SPEED; });

                if (paddle.laserTimer > 0 && paddle.laserCooldown <= 0) {

                balls.forEach(b => {

                        b.y = paddle.y - paddle.height / 2 - b.radius - 2;
