<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Neon Brick Breaker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #05010f;
    font-family: 'Courier New', monospace;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }
  #gameCanvas {
    display: block;
    width: 100vw;
    height: 100vh;
    cursor: none;
  }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
(() => {
  'use strict';

  // ============ CANVAS SETUP ============
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  let W = 0, H = 0, DPR = 1;

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    layoutBricks(true);
  }
  window.addEventListener('resize', resize);

  // ============ AUDIO (Web Audio API) ============
  let audioCtx = null;
  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function playTone(freq, dur, type = 'square', vol = 0.15, slideTo = null) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    if (slideTo) osc.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + dur);
  }

  function playNoise(dur, vol = 0.2) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const bufSize = audioCtx.sampleRate * dur;
    const buffer = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
    const src = audioCtx.createBufferSource();
    src.buffer = buffer;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = 800;
    src.connect(filter).connect(gain).connect(audioCtx.destination);
    src.start(t);
  }

  const sfx = {
    paddle: () => playTone(220, 0.08, 'square', 0.12, 330),
    wall:   () => playTone(440, 0.05, 'triangle', 0.08),
    brick:  (row) => { playTone(520 + row * 60, 0.09, 'square', 0.12, 780 + row * 60); playNoise(0.08, 0.06); },
    loseLife: () => { playTone(300, 0.5, 'sawtooth', 0.15, 60); playNoise(0.3, 0.1); },
    gameOver: () => { playTone(200, 0.8, 'sawtooth', 0.15, 40); },
    victory: () => {
      [523, 659, 784, 1047].forEach((f, i) => {
        setTimeout(() => playTone(f, 0.25, 'square', 0.12), i * 130);
      });
    },
    levelUp: () => {
      [440, 554, 659].forEach((f, i) => {
        setTimeout(() => playTone(f, 0.15, 'triangle', 0.12), i * 90);
      });
    },
    launch: () => playTone(180, 0.15, 'triangle', 0.1, 500)
  };

  // ============ GAME CONSTANTS ============
  const MAX_LEVEL = 5;
  const ROW_COLORS = [
    { main: '#ff2d78', glow: '#ff2d78' },
    { main: '#ff9f1c', glow: '#ff9f1c' },
    { main: '#ffee32', glow: '#ffee32' },
    { main: '#3bf273', glow: '#3bf273' },
    { main: '#00e5ff', glow: '#00e5ff' },
    { main: '#b14aff', glow: '#b14aff' }
  ];

  // ============ GAME STATE ============
  const STATE = { START: 0, PLAYING: 1, BALL_HELD: 2, GAME_OVER: 3, VICTORY: 4, LEVEL_CLEAR: 5 };
  let gameState = STATE.START;
  let score = 0, lives = 3, level = 1;
  let stateTimer = 0;
  let screenShake = 0;
  let combo = 0;

  const paddle = { x: 0, y: 0, w: 120, h: 14, targetX: 0, prevX: 0, vx: 0 };
  const ball = { x: 0, y: 0, r: 8, vx: 0, vy: 0, speed: 0, baseSpeed: 0, trail: [] };
  let bricks = [];
  let particles = [];
  let stars = [];

  // ============ STARFIELD BACKGROUND ============
  function initStars() {
    stars = [];
    for (let i = 0; i < 90; i++) {
      stars.push({
        x: Math.random(), y: Math.random(),
        size: Math.random() * 1.6 + 0.4,
        tw: Math.random() * Math.PI * 2,
        spd: Math.random() * 0.5 + 0.2
      });
    }
  }

  // ============ BRICK LAYOUT ============
  function brickConfig() {
    const rows = Math.min(4 + level, 8);
    const cols = W < 500 ? 7 : (W < 900 ? 9 : 12);
    return { rows, cols };
  }

  function layoutBricks(repositionOnly = false) {
    if (!W || !H) return;
    const { rows, cols } = brickConfig();
    const marginX = Math.max(12, W * 0.03);
    const topOffset = Math.max(58, H * 0.09);
    const gap = 5;
    const totalW = W - marginX * 2;
    const bw = (totalW - gap * (cols - 1)) / cols;
    const bh = Math.min(26, Math.max(16, H * 0.028));

    if (repositionOnly && bricks.length) {
      // reflow existing bricks on resize
      bricks.forEach(b => {
        b.x = marginX + b.col * (bw + gap);
        b.y = topOffset + b.row * (bh + gap);
        b.w = bw;
        b.h = bh;
      });
      // reposition paddle & ball bounds
      paddle.y = H - 42;
      paddle.x = Math.min(Math.max(paddle.x, 0), W - paddle.w);
      return;
    }

    bricks = [];
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        // higher levels: some bricks need 2 hits
        const tough = level >= 3 && r < 2 && Math.random() < 0.35 + level * 0.05;
        bricks.push({
          row: r, col: c,
          x: marginX + c * (bw + gap),
          y: topOffset + r * (bh + gap),
          w: bw, h: bh,
          hp: tough ? 2 : 1,
          maxHp: tough ? 2 : 1,
          color: ROW_COLORS[r % ROW_COLORS.length],
          alive: true,
          flash: 0
        });
      }
    }
  }

  // ============ RESET / SETUP ============
  function resetPaddle() {
    paddle.w = Math.max(80, Math.min(140, W * 0.14));
    paddle.h = 14;
    paddle.x = (W - paddle.w) / 2;
    paddle.targetX = paddle.x;
    paddle.y = H - 42;
  }

  function holdBall() {
    ball.r = Math.max(6, Math.min(9, W * 0.011));
    ball.x = paddle.x + paddle.w / 2;
    ball.y = paddle.y - ball.r - 2;
    ball.vx = 0;
    ball.vy = 0;
    ball.trail = [];
    ball.baseSpeed = Math.min(W, H) * 0.62 + level * 30;
    ball.speed = ball.baseSpeed;
    gameState = STATE.BALL_HELD;
  }

  function launchBall() {
    const angle = -Math.PI / 2 + (Math.random() * 0.6 - 0.3);
    ball.vx = Math.cos(angle) * ball.speed;
    ball.vy = Math.sin(angle) * ball.speed;
    gameState = STATE.PLAYING;
    sfx.launch();
  }

  function startGame() {
    score = 0;
    lives = 3;
    level = 1;
    combo = 0;
    layoutBricks();
    resetPaddle();
    holdBall();
  }

  function nextLevel() {
    level++;
    combo = 0;
    layoutBricks();
    resetPaddle();
    holdBall();
    sfx.levelUp();
  }

  // ============ PARTICLES ============
  function spawnParticles(x, y, color, count = 14, power = 1) {
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = (Math.random() * 180 + 60) * power;
      particles.push({
        x, y,
        vx: Math.cos(a) * s,
        vy: Math.sin(a) * s - 40,
        life: 1,
        decay: Math.random() * 1.8 + 1.2,
        size: Math.random() * 3.5 + 1.5,
        color
      });
    }
  }

  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 420 * dt; // gravity
      p.vx *= (1 - 1.2 * dt);
      p.life -= p.decay * dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  // ============ INPUT ============
  const keys = {};
  window.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (e.key === ' ' || e.key === 'Enter') {
      e.preventDefault();
      handleAction();
    }
  });
  window.addEventListener('keyup', e => { keys[e.key] = false; });

  let pointerActive = false;
  function pointerX(e) {
    const rect = canvas.getBoundingClientRect();
    const cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    return cx;
  }

  function onPointerMove(e) {
    const x = pointerX(e);
    paddle.targetX = x - paddle.w / 2;
    pointerActive = true;
  }

  function handleAction() {
    initAudio();
    if (gameState === STATE.START) startGame();
    else if (gameState === STATE.BALL_HELD) launchBall();
    else if (gameState === STATE.GAME_OVER || gameState === STATE.VICTORY) {
      gameState = STATE.START;
    }
  }

  canvas.addEventListener('mousemove', onPointerMove);
  canvas.addEventListener('mousedown', e => { onPointerMove(e); handleAction(); });
  canvas.addEventListener('touchstart', e => { e.preventDefault(); onPointerMove(e); handleAction(); }, { passive: false });
  canvas.addEventListener('touchmove', e => { e.preventDefault(); onPointerMove(e); }, { passive: false });

  // ============ PHYSICS ============
  function updatePaddle(dt) {
    paddle.prevX = paddle.x;
    const kbSpeed = W * 0.9;
    if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
      paddle.targetX -= kbSpeed * dt;
      pointerActive = false;
    }
    if (keys['ArrowRight'] || keys['d'] || keys['D']) {
      paddle.targetX += kbSpeed * dt;
      pointerActive = false;
    }
    paddle.targetX = Math.min(Math.max(paddle.targetX, 0), W - paddle.w);

    // smooth follow
    const lerp = 1 - Math.pow(0.0001, dt); // frame-rate independent smoothing
    paddle.x += (paddle.targetX - paddle.x) * lerp;
    paddle.x = Math.min(Math.max(paddle.x, 0), W - paddle.w);
    paddle.vx = (paddle.x - paddle.prevX) / dt;
  }

  function circleRectCollide(cx, cy, r, rx, ry, rw, rh) {
    const nx = Math.max(rx, Math.min(cx, rx + rw));
    const ny = Math.max(ry, Math.min(cy, ry + rh));
    const dx = cx - nx, dy = cy - ny;
    return (dx * dx + dy * dy) <= r * r;
  }

  function updateBall(dt) {
    if (gameState === STATE.BALL_HELD) {
      ball.x = paddle.x + paddle.w / 2;
      ball.y = paddle.y - ball.r - 2;
      return;
    }
    if (gameState !== STATE.PLAYING) return;

    // sub-stepping for tunneling prevention at high speeds
    const steps = Math.max(1, Math.ceil((Math.abs(ball.vx) + Math.abs(ball.vy)) * dt / (ball.r * 0.8)));
    const sdt = dt / steps;

    for (let s = 0; s < steps; s++) {
      ball.x += ball.vx * sdt;
      ball.y += ball.vy * sdt;

      // walls
      if (ball.x - ball.r < 0) {
        ball.x = ball.r;
        ball.vx = Math.abs(ball.vx);
        sfx.wall();
      } else if (ball.x + ball.r > W) {
        ball.x = W - ball.r;
        ball.vx = -Math.abs(ball.vx);
        sfx.wall();
      }
      if (ball.y - ball.r < 0) {
        ball.y = ball.r;
        ball.vy = Math.abs(ball.vy);
        sfx.wall();
      }

      // bottom = lose life
      if (ball.y - ball.r > H) {
        loseLife();
        return;
      }

      // paddle collision
      if (ball.vy > 0 && circleRectCollide(ball.x, ball.y, ball.r, paddle.x, paddle.y, paddle.w, paddle.h)) {
        ball.y = paddle.y - ball.r;
        // reflection angle based on hit position (realistic paddle physics)
        const hitPos = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
        const clamped = Math.max(-1, Math.min(1, hitPos));
        const maxAngle = Math.PI * 0.36; // ~65 degrees max
        const angle = -Math.PI / 2 + clamped * maxAngle;
        // paddle movement imparts english
        const english = Math.max(-0.15, Math.min(0.15, paddle.vx / 4000));
        const finalAngle = angle + english;
        ball.vx = Math.cos(finalAngle) * ball.speed;
        ball.vy = Math.sin(finalAngle) * ball.speed;
        if (ball.vy > -ball.speed * 0.25) { // ensure it goes up meaningfully
          ball.vy = -ball.speed * 0.25;
          const mag = Math.sqrt(ball.speed * ball.speed - ball.vy * ball.vy);
          ball.vx = Math.sign(ball.vx || 1) * mag;
        }
        combo = 0;
        sfx.paddle();
        spawnParticles(ball.x, paddle.y, { main: '#00e5ff' }, 5, 0.4);
      }

      // brick collisions
      for (let i = 0; i < bricks.length; i++) {
        const b = bricks[i];
        if (!b.alive) continue;
        if (!circleRectCollide(ball.x, ball.y, ball.r, b.x, b.y, b.w, b.h)) continue;

        // determine collision side via penetration depth
        const overlapLeft   = (ball.x + ball.r) - b.x;
        const overlapRight  = (b.x + b.w) - (ball.x - ball.r);
        const overlapTop    = (ball.y + ball.r) - b.y;
        const overlapBottom = (b.y + b.h) - (ball.y - ball.r);
        const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);

        if (minOverlap === overlapTop && ball.vy > 0) {
          ball.vy = -Math.abs(ball.vy);
          ball.y = b.y - ball.r;
        } else if (minOverlap === overlapBottom && ball.vy < 0) {
          ball.vy = Math.abs(ball.vy);
          ball.y = b.y + b.h + ball.r;
        } else if (minOverlap === overlapLeft && ball.vx > 0) {
          ball.vx = -Math.abs(ball.vx);
          ball.x = b.x - ball.r;
        } else if (minOverlap === overlapRight && ball.vx < 0) {
          ball.vx = Math.abs(ball.vx);
          ball.x = b.x + b.w + ball.r;
        } else {
          ball.vy = -ball.vy;
        }

        b.hp--;
        b.flash = 1;
        sfx.brick(b.row);

        if (b.hp <= 0) {
          b.alive = false;
          combo++;
          const points = (10 + (brickConfig().rows - b.row) * 5) * (1 + Math.floor(combo / 4)) ;
          score += points;
          spawnParticles(b.x + b.w / 2, b.y + b.h / 2, b.color, 16, 1);
          screenShake = Math.min(screenShake + 3, 8);

          // realistic speed increase per broken brick
          ball.speed = Math.min(ball.speed * 1.012, ball.baseSpeed * 1.75);
          const mag = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
          ball.vx = ball.vx / mag * ball.speed;
          ball.vy = ball.vy / mag * ball.speed;
        } else {
          spawnParticles(ball.x, ball.y, b.color, 6, 0.5);
          score += 5;
        }
        break; // one brick per sub-step
      }
    }

    // trail
    ball.trail.push({ x: ball.x, y: ball.y });
    if (ball.trail.length > 12) ball.trail.shift();

    // victory check
    if (bricks.every(b => !b.alive)) {
      if (level >= MAX_LEVEL) {
        gameState = STATE.VICTORY;
        sfx.victory();
      } else {
        gameState = STATE.LEVEL_CLEAR;
        stateTimer = 2;
        sfx.levelUp();
      }
    }
  }

  function loseLife() {
    lives--;
    screenShake = 12;
    spawnParticles(ball.x, H - 10, { main: '#ff2d78' }, 24, 1.4);
    if (lives <= 0) {
      gameState = STATE.GAME_OVER;
      sfx.gameOver();
    } else {
      sfx.loseLife();
      holdBall();
    }
  }

  // ============ RENDERING ============
  function drawBackground(t) {
    ctx.fillStyle = '#05010f';
    ctx.fillRect(0, 0, W, H);

    // subtle gradient glow at bottom
    const grad = ctx.createRadialGradient(W / 2, H * 1.1, 0, W / 2, H * 1.1, H * 0.8);
    grad.addColorStop(0, 'rgba(80, 0, 120, 0.25)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // stars
    stars.forEach(s => {
      const tw = 0.4 + 0.6 * Math.abs(Math.sin(t * s.spd + s.tw));
      ctx.fillStyle = `rgba(160, 200, 255, ${tw * 0.7})`;
      ctx.fillRect(s.x * W, s.y * H, s.size, s.size);
    });

    // grid lines (faint neon floor vibe)
    ctx.strokeStyle = 'rgba(0, 229, 255, 0.04)';
    ctx.lineWidth = 1;
    const gsize = 60;
    ctx.beginPath();
    for (let x = 0; x <= W; x += gsize) { ctx.moveTo(x, 0); ctx.lineTo(x, H); }
    for (let y = 0; y <= H; y += gsize) { ctx.moveTo(0, y); ctx.lineTo(W, y); }
    ctx.stroke();
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function drawBricks(dt) {
    bricks.forEach(b => {
      if (!b.alive) return;
      if (b.flash > 0) b.flash = Math.max(0, b.flash - dt * 5);

      const damaged = b.hp < b.maxHp;
      ctx.save();
      ctx.shadowColor = b.color.glow;
      ctx.shadowBlur = 12 + b.flash * 20;

      const alpha = damaged ? 0.55 : 0.9;
      ctx.globalAlpha = alpha + b.flash * 0.1;
      ctx.fillStyle = b.color.main;
      roundRect(b.x, b.y, b.w, b.h, 4);
      ctx.fill();

      // inner highlight
      ctx.globalAlpha = 0.35;
      ctx.fillStyle = '#ffffff';
      roundRect(b.x + 2, b.y + 2, b.w - 4, b.h * 0.35, 3);
      ctx.fill();

      // tough brick outline
      if (b.maxHp > 1 && !damaged) {
        ctx.globalAlpha = 0.9;
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 1.5;
        roundRect(b.x + 1.5, b.y + 1.5, b.w - 3, b.h - 3, 3);
        ctx.stroke();
      }
      ctx.restore();
    });
  }

  function drawPaddle(t) {
    ctx.save();
    ctx.shadowColor = '#00e5ff';
    ctx.shadowBlur = 18;
    const grad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.h);
    grad.addColorStop(0, '#7df9ff');
    grad.addColorStop(0.5, '#00e5ff');
    grad.addColorStop(1, '#0077b6');
    ctx.fillStyle = grad;
    roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 7);
    ctx.fill();

    // pulsing edge lights
    const pulse = 0.6 + 0.4 * Math.sin(t * 5);
    ctx.shadowBlur = 10;
    ctx.fillStyle = `rgba(255,255,255,${pulse})`;
    ctx.beginPath();
    ctx.arc(paddle.x + 8, paddle.y + paddle.h / 2, 2.5, 0, Math.PI * 2);
    ctx.arc(paddle.x + paddle.w - 8, paddle.y + paddle.h / 2, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawBall() {
    // trail
    for (let i = 0; i < ball.trail.length; i++) {
      const p = ball.trail[i];
      const f = i / ball.trail.length;
      ctx.globalAlpha = f * 0.3;
      ctx.fillStyle = '#00e5ff';
      ctx.beginPath();
      ctx.arc(p.x, p.y, ball.r * f, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    ctx.save();
    ctx.shadowColor = '#ffffff';
    ctx.shadowBlur = 20;
    const grad = ctx.createRadialGradient(ball.x - 2, ball.y - 3, 1, ball.x, ball.y, ball.r);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(0.6, '#aef3ff');
    grad.addColorStop(1, '#00b4d8');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawParticles() {
    particles.forEach(p => {
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color.main;
      ctx.shadowColor = p.color.main;
      ctx.shadowBlur = 6;
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    });
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }

  function drawHUD() {
    const fs = Math.max(14, Math.min(20, W * 0.02));
    ctx.font = `bold ${fs}px 'Courier New', monospace`;
    ctx.textBaseline = 'top';

    ctx.save();
    ctx.shadowBlur = 8;

    ctx.shadowColor = '#00e5ff';
    ctx.fillStyle = '#00e5ff';
    ctx.textAlign = 'left';
    ctx.fillText(`SCORE ${score}`, 16, 14);

    ctx.shadowColor = '#ffee32';
    ctx.fillStyle = '#ffee32';
    ctx.textAlign = 'center';
    ctx.fillText(`LEVEL ${level}`, W / 2, 14);

    ctx.textAlign = 'right';
    ctx.shadowColor = '#ff2d78';
    ctx.fillStyle = '#ff2d78';
    let hearts = '';
    for (let i = 0; i < lives; i++) hearts += '♥ ';
    ctx.fillText(hearts.trim() || '—', W - 16, 14);
    ctx.restore();
    ctx.textAlign = 'left';
  }

  function drawCenteredText(lines, t) {
    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    let y = H / 2 - (lines.length - 1) * 30;
    lines.forEach((line, i) => {
      const fs = line.big ? Math.max(32, Math.min(64, W * 0.07)) : Math.max(14, Math.min(20, W * 0.022));
      ctx.font = `bold ${fs}px 'Courier New', monospace`;
      ctx.shadowColor = line.color;
      ctx.shadowBlur = line.big ? 24 : 10;
      ctx.fillStyle = line.color;
      if (line.pulse) ctx.globalAlpha = 0.5 + 0.5 * Math.abs(Math.sin(t * 2.5));
      else ctx.globalAlpha = 1;
      ctx.fillText(line.text, W / 2, y);
      y += line.big ? fs * 1.1 : fs * 2.2;
    });
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  // ============ MAIN LOOP ============
  let lastTime = performance.now();

  function loop(now) {
    let dt = (now - lastTime) / 1000;
    lastTime = now;
    dt = Math.min(dt, 0.033); // clamp for tab-switch spikes
    const t = now / 1000;

    // update
    if (gameState === STATE.PLAYING || gameState === STATE.BALL_HELD) {
      updatePaddle(dt);
      updateBall(dt);
    }
    if (gameState === STATE.LEVEL_CLEAR) {
      stateTimer -= dt;
      updatePaddle(dt);
      if (stateTimer <= 0) nextLevel();
    }
    updateParticles(dt);
    screenShake = Math.max(0, screenShake - dt * 25);

    // render
    ctx.save();
    if (screenShake > 0.2) {
      ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
    }

    drawBackground(t);

    if (gameState === STATE.START) {
      drawCenteredText([
        { text: 'BRICK BREAKER', big: true, color: '#00e5ff' },
        { text: '━━━━━━━━━━━━━━━━━━', color: '#b14aff' },
        { text: 'MOVE · mouse / touch / arrow keys', color: '#ffffff' },
        { text: 'LAUNCH · click / tap / space', color: '#ffffff' },
        { text: 'CLICK OR TAP TO START', color: '#ffee32', pulse: true }
      ], t);
    } else if (gameState === STATE.GAME_OVER) {
      drawBricks(dt);
      drawParticles();
      drawCenteredText([
        { text: 'GAME OVER', big: true, color: '#ff2d78' },
        { text: `FINAL SCORE · ${score}`, color: '#ffffff' },
        { text: `REACHED LEVEL ${level}`, color: '#ffffff' },
        { text: 'CLICK OR TAP TO RESTART', color: '#ffee32', pulse: true }
      ], t);
      drawHUD();
    } else if (gameState === STATE.VICTORY) {
      drawParticles();
      if (Math.random() < 0.15) {
        spawnParticles(Math.random() * W, Math.random() * H * 0.6,
          ROW_COLORS[Math.floor(Math.random() * ROW_COLORS.length)], 10, 0.8);
      }
      drawCenteredText([
        { text: 'VICTORY!', big: true, color: '#3bf273' },
        { text: `ALL ${MAX_LEVEL} LEVELS CLEARED`, color: '#ffffff' },
        { text: `FINAL SCORE · ${score}`, color: '#00e5ff' },
        { text: 'CLICK OR TAP TO PLAY AGAIN', color: '#ffee32', pulse: true }
      ], t);
    } else {
      drawBricks(dt);
      drawPaddle(t);
      drawBall();
      drawParticles();
      drawHUD();

      if (gameState === STATE.BALL_HELD) {
        drawCenteredText([
          { text: 'CLICK · TAP · SPACE TO LAUNCH', color: '#ffee32', pulse: true }
        ], t);
      }
      if (gameState === STATE.LEVEL_CLEAR) {
        drawCenteredText([
          { text: `LEVEL ${level} CLEARED`, big: true, color: '#3bf273' },
          { text: 'GET READY...', color: '#ffffff', pulse: true }
        ], t);
      }
    }

    ctx.restore();
    requestAnimationFrame(loop);
  }

  // ============ INIT ============
  resize();
  initStars();
  resetPaddle();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
